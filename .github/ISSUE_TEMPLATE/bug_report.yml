name: Bug report
description: Report incorrect behavior or a defect
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the wrong result you observed.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest snippet that reproduces the issue.
      render: php
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.2 / 8.3 / 8.4"
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: khaledalam/unit version
    validations:
      required: true
